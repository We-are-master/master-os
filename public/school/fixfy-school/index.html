<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<title>Fixfy School</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="/school/fixfy-school/app.css"/>
<link rel="stylesheet" href="/school/fixfy-school/school.css"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ED4B00'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='18' font-weight='600' fill='white' text-anchor='middle'%3Ef%3C/text%3E%3C/svg%3E"/>
</head>
<body>
<div class="fx-app fx-app--school">
  <div class="fx-main fx-main--school">
    <header class="sc-topnav">
      <button type="button" class="sc-topnav__home" id="scHome">
        <i data-lucide="graduation-cap"></i>School home
      </button>
      <div class="sc-topnav__spacer"></div>
      <button type="button" class="fx-btn fx-btn--ghost fx-btn--sm sc-topnav__os" id="scBackOs">
        <i data-lucide="arrow-left"></i>Back to OS
      </button>
    </header>

    <main class="fx-page sc-view is-active" data-view="home">
      <div class="sc-wrap" id="homeWrap"></div>
    </main>

    <main class="fx-page sc-view" data-view="phase">
      <div class="sc-wrap" id="phaseWrap"></div>
    </main>
  </div>
</div>

<div class="sc-player" id="player">
  <header class="sc-hud">
    <button type="button" class="sc-hud__home" id="hudHome"><i data-lucide="graduation-cap"></i>School home</button>
    <div class="sc-hud__back" id="hudBack"><i data-lucide="arrow-left"></i>Exit lesson</div>
    <div class="sc-hud__sep"></div>
    <div class="sc-hud__title" id="hudTitle">Lesson</div>
    <div class="sc-hud__sep"></div>
    <div class="sc-hud__scene" id="hudScene">Scene 1 of 1</div>
    <div class="sc-hud__spacer"></div>
    <div class="sc-hud__xp" id="hudXp"><i data-lucide="zap"></i><span class="n">0</span>&nbsp;XP</div>
    <div class="sc-hud__prog" id="hudProg"></div>
  </header>
  <div class="sc-toast" id="scToast"><i data-lucide="zap"></i><span></span></div>
  <div class="sc-stage" id="stage"></div>
  <div class="sc-complete-screen" id="scCompleteScreen" hidden aria-hidden="true"></div>
  <div class="sc-complete-dock" id="scCompleteDock" hidden aria-hidden="true">
    <div class="sc-complete-dock__stack">
      <button type="button" class="sc-complete-dock__btn" data-go-next>
        <span class="sc-complete-dock__copy">
          <span class="sc-complete-dock__k" id="scCompleteDockK">Next lesson</span>
          <span class="sc-complete-dock__title" id="scCompleteDockTitle">Continue</span>
        </span>
        <span class="sc-complete-dock__icon"><i data-lucide="arrow-right"></i></span>
      </button>
      <button type="button" class="sc-complete-dock__btn sc-complete-dock__btn--review" data-review-lesson>
        <span class="sc-complete-dock__copy">
          <span class="sc-complete-dock__k">Back to review</span>
          <span class="sc-complete-dock__title">Read the scenes from the top</span>
        </span>
        <span class="sc-complete-dock__icon"><i data-lucide="chevrons-up"></i></span>
      </button>
      <button type="button" class="sc-complete-dock__exit" data-finish>
        <i data-lucide="check-circle-2"></i>Mark complete &amp; exit
      </button>
    </div>
  </div>
</div>

<canvas id="scConfetti"></canvas>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="/school/fixfy-school/school-bridge.js"></script>
<script src="/school/fixfy-school/school-lessons.generated.js"></script>
<script src="/school/fixfy-school/school-data.js"></script>
<script src="/school/fixfy-school/school-flows.js"></script>
<script src="/school/fixfy-school/school-catalog-board.js"></script>
<script src="/school/fixfy-school/school.js"></script>
</body>
</html>
