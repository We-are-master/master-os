  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

fx-mute:#6B6B85;\n  --fx-line:#E4E4EC; --fx-line-2:#CDCDD8;\n  --fx-paper:#F7F7FB; --fx-paper-2:#EEEEF5; --fx-white:#fff;\n  /* on navy */\n  --fx-on-1:rgba(255,255,255,.92); --fx-on-2:rgba(255,255,255,.62); --fx-on-3:rgba(255,255,255,.40);\n  --fx-on-line:rgba(255,255,255,.08); --fx-on-line-2:rgba(255,255,255,.16);\n  /* semantic */\n  --fx-green:#0E8A5F; --fx-green-50:#E4F4EC;\n  --fx-amber:#C47A00; --fx-amber-50:#FBEFD6;\n  --fx-red:#C8102E;   --fx-red-50:#FBE3E7;\n  --fx-blue:#0B5FFF;  --fx-blue-50:#E1ECFF;\n  /* type */\n  --fx-sans:'Geist','Inter',-apple-system,sans-serif;\n  --fx-mono:'Geist Mono',ui-monospace,monospace;\n  /* radii / elev / motion */\n  --fx-r-1:4px; --fx-r-2:8px; --fx-r-3:12px; --fx-r-full:9999px;\n  --fx-e-1:0 1px 2px rgba(2,0,64,.06), 0 1px 1px rgba(2,0,64,.04);\n  --fx-e-2:0 8px 24px rgba(2,0,64,.08), 0 2px 6px rgba(2,0,64,.05);\n  --fx-e-3:0 24px 48px rgba(2,0,64,.14);\n  --fx-dur:160ms; --fx-ease:cubic-bezier(.2,0,0,1);\n  /* layout */\n  --fx-sidebar-w:232px; --fx-topbar-h:56px;\n}\n\n*,*::before,*::after{box-sizing:border-box}\nhtml,body{margin:0;padding:0;height:100%}\nbody{font-family:var(--fx-sans);font-size:14px;line-height:1.5;color:var(--fx-ink);background:var(--fx-paper);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\nbutton,input,select,textarea{font:inherit;color:inherit}\na{color:inherit;text-decoration:none}\n\n/* type helpers */\n.fx-mono{font-family:var(--fx-mono)}\n.fx-kk{font-family:var(--fx-mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--fx-mute)}\n.fx-kk-on{font-family:var(--fx-mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--fx-on-2)}\n.fx-h1{font-size:26px;font-weight:600;letter-spacing:-.015em;line-height:1.2;color:var(--fx-ink);margin:0}\n.fx-h2{font-size:18px;font-weight:600;letter-spacing:-.005em;line-height:1.3;color:var(--fx-ink);margin:0}\n.fx-h3{font-size:14px;font-weight:600;color:var(--fx-ink);margin:0}\n.fx-lede{font-size:13px;color:var(--fx-mute);margin:0}\n.fx-num{font-family:var(--fx-sans);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.01em}\n\n/* ============== APP SHELL ============== */\n.fx-app{display:grid;grid-template-columns:var(--fx-sidebar-w) 1fr;min-height:100vh}\n\n/* sidebar */\n.fx-side{background:var(--fx-navy-2);color:var(--fx-on-1);padding:18px 0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.04)}\n.fx-side__brand{display:flex;align-items:center;gap:10px;padding:0 20px 22px}\n.fx-side__brand-mark{width:24px;height:24px;border-radius:6px;background:var(--fx-coral);display:grid;place-items:center;color:#fff;font-family:var(--fx-mono);font-weight:600;font-size:13px}\n.fx-side__brand-name{font-weight:600;font-size:15px;letter-spacing:-.01em}\n.fx-side__group{padding:14px 12px 4px}\n.fx-side__group-h{font-family:var(--fx-mono);font-size:9.5px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--fx-on-3);padding:0 8px 8px}\n.fx-side__nav{display:flex;flex-direction:column;gap:1px}\n.fx-side__link{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;color:var(--fx-on-2);font-size:13.5px;font-weight:500;position:relative;transition:background var(--fx-dur),color var(--fx-dur);cursor:pointer}\n.fx-side__link:hover{background:rgba(255,255,255,.04);color:var(--fx-on-1)}\n.fx-side__link svg{flex:0 0 auto;width:16px;height:16px;opacity:.85}\n.fx-side__link.is-active{background:rgba(237,75,0,.10);color:#fff}\n.fx-side__link.is-active::before{content:\"\";position:absolute;left:-12px;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--fx-coral)}\n.fx-side__link.is-active svg{opacity:1;color:var(--fx-coral)}\n.fx-side__foot{margin-top:auto;padding:14px 20px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--fx-on-line)}\n.fx-side__avatar{width:28px;height:28px;border-radius:50%;background:rgba(237,75,0,.18);color:var(-- ============================\n   PHASE (season page)\n   ============================================================ */\n.sc-season{position:relative;border-radius:18px;overflow:hidden;background:linear-gradient(115deg,#15153D,#020040);color:#fff;padding:38px 36px;isolation:isolate}\n.sc-season::after{content:\"\";position:absolute;right:-60px;bottom:-120px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(237,75,0,.4),transparent 64%);z-index:-1}\n.sc-season__k{font-family:var(--fx-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fx-coral-h)}\n.sc-season__t{font-size:34px;font-weight:600;letter-spacing:-.025em;margin:10px 0 0}\n.sc-season__d{font-size:14px;color:var(--fx-on-2);margin:12px 0 0;max-width:56ch;line-height:1.6}\n.sc-season__meta{display:flex;gap:22px;margin-top:22px;flex-wrap:wrap}\n.sc-season__meta .m{display:flex;flex-direction:column;gap:3px}\n.sc-season__meta .mv{font-size:20px;font-weight:600;letter-spacing:-.02em}\n.sc-season__meta .mk{font-family:var(--fx-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fx-on-3)}\n\n/* episode list (vertical) */\n.sc-list{margin-top:24px;display:flex;flex-direction:column;gap:10px}\n.sc-row{display:flex;align-items:center;gap:18px;background:var(--fx-white);border:1px solid var(--fx-line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:border-color var(--fx-dur),box-shadow var(--fx-dur),transform var(--fx-dur)}\n.sc-row:hover{border-color:var(--fx-line-2);box-shadow:var(--fx-e-2);transform:translateX(3px)}\n.sc-row.is-locked{cursor:not-allowed;opacity:.65}\n.sc-row.is-locked:hover{border-color:var(--fx-line);box-shadow:none;transform:none}\n.sc-row__num{width:52px;height:52px;flex:0 0 auto;border-radius:13px;display:grid;place-items:center;font-family:var(--fx-mono);font-size:19px;font-weight:600;color:#fff;position:relative}\n.sc-row__num .ck{position:absolute;inset:0;display:grid;place-items:center;background:var(--fx-green);border-radius:13px}\n.sc-row__num .ck svg{width:22px;height:22px}\n.sc-row__main{flex:1;min-width:0}\n.sc-row__t{font-size:15px;font-weight:600;letter-spacing:-.01em}\n.sc-row__d{font-size:12.5px;color:var(--fx-mute);margin-top:3px}\n.sc-row__meta{display:flex;align-items:center;gap:14px;font-family:var(--fx-mono);font-size:11px;color:var(--fx-mute);flex:0 0 auto}\n.sc-row__meta .m{display:flex;align-items:center;gap:5px}\n.sc-row__meta svg{width:13px;height:13px}\n.sc-row__xp{color:var(--fx-coral-p);font-weight:500}\n.sc-row__go{width:38px;height:38px;border-radius:50%;border:1px solid var(--fx-line);display:grid;place-items:center;color:var(--fx-coral);flex:0 0 auto;transition:background var(--fx-dur),border-color var(--fx-dur)}\n.sc-row:hover .sc-row__go{background:var(--fx-coral);border-color:var(--fx-coral);color:#fff}\n.sc-row__go svg{width:16px;height:16px;margin-left:1px}\n.sc-row.is-locked .sc-row__go{color:var(--fx-mute)}\n.sc-row.is-locked:hover .sc-row__go{background:transparent;border-color:var(--fx-line);color:var(--fx-mute)}\n\n/* ============================================================\n   LESSON PLAYER — cinematic scroll\n   ============================================================ */\n.sc-player{display:none}\n.sc-player.is-active{display:block}\nbody.sc-reading .fx-app{display:none}\n\n.sc-stage{background:var(--fx-paper);min-height:100vh;padding-bottom:1px}\n\n/* HUD */\n.sc-hud{position:fixed;top:0;left:0;right:0;z-index:70;height:58px;display:flex;align-items:center;gap:16px;padding:0 26px;background:color-mix(in srgb,var(--fx-paper) 84%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--fx-line)}\n.sc-hud__back{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--fx-slate);cursor:pointer;flex:0 0 auto}\n.sc-hud__back:hover{color:var(--fx-ink)}\n.sc-hud__back svg{width:16px;height:16px}\n.sc-hud__title{font-size:13.5px;font-weight:600;letter-spacing:-.01em;white-space: m;line-height:1.08;margin:16px 0 0;color:var(--fx-ink);text-wrap:balance}\n.sc-scene .sc-lead{font-size:clamp(16px,1.7vw,19px);line-height:1.65;color:var(--fx-slate);margin:22px 0 0;max-width:62ch}\n.sc-scene .sc-lead b{color:var(--fx-ink);font-weight:600}\n.sc-scene p+p{margin-top:16px}\n\n/* reveal animation */\n.sc-anim{opacity:0;transform:translateY(26px);transition:opacity .7s var(--fx-ease),transform .7s var(--fx-ease)}\n.sc-scene.in .sc-anim{opacity:1;transform:none}\n.sc-scene.in .sc-anim.d1{transition-delay:.08s}\n.sc-scene.in .sc-anim.d2{transition-delay:.16s}\n.sc-scene.in .sc-anim.d3{transition-delay:.24s}\n.sc-scene.in .sc-anim.d4{transition-delay:.32s}\n@media (prefers-reduced-motion:reduce){.sc-anim{opacity:1;transform:none;transition:none}}\n\n/* dark \"feature\" band scene (cinematic interlude) */\n.sc-scene--dark{background:radial-gradient(110% 120% at 80% 0%,#1B1B47,#020040);color:#fff}\n.sc-scene--dark h2{color:#fff}\n.sc-scene--dark .sc-lead{color:var(--fx-on-2)}\n.sc-scene--dark .sc-lead b{color:#fff}\n.sc-scene--dark .sc-scene__eyebrow{color:var(--fx-on-3)}\n.sc-scene--dark::before{content:\"\";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(120% 100% at 80% 0%,#000,transparent 72%);pointer-events:none}\n\n/* scroll hint on cover */\n.sc-cover{min-height:100vh;text-align:center;align-items:center}\n.sc-cover .sc-scene__inner{max-width:780px}\n.sc-cover__badge{width:84px;height:84px;border-radius:24px;margin:0 auto;display:grid;place-items:center;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff}\n.sc-cover__badge svg{width:40px;height:40px}\n.sc-cover h2{font-size:clamp(34px,6vw,64px)}\n.sc-cover__meta{display:inline-flex;gap:10px;margin-top:24px;flex-wrap:wrap;justify-content:center}\n.sc-scrollhint{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--fx-on-3);font-family:var(--fx-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;animation:bob 1.8s ease-in-out infinite}\n.sc-scrollhint svg{width:18px;height:18px}\n@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}\n\n/* ============================================================\n   IN-SCENE VISUALS (polished static)\n   ============================================================ */\n/* one-sentence summary callout */\n.sc-callout{margin-top:28px;border-radius:14px;border:1px solid var(--fx-coral-50);border-left:3px solid var(--fx-coral);background:var(--fx-coral-50);padding:20px 22px}\n.sc-callout__k{font-family:var(--fx-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fx-coral-p)}\n.sc-callout__t{font-size:17px;line-height:1.55;color:var(--fx-ink);margin-top:8px;font-weight:500}\n\n/* team trio */\n.sc-team{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px}\n.sc-person{background:var(--fx-white);border:1px solid var(--fx-line);border-radius:16px;padding:20px;box-shadow:var(--fx-e-1);position:relative;overflow:hidden}\n.sc-person__top{display:flex;align-items:center;gap:12px}\n.sc-person__av{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;font-size:17px;flex:0 0 auto}\n.sc-person__name{font-size:15px;font-weight:600;letter-spacing:-.01em}\n.sc-person__role{font-family:var(--fx-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--fx-mute);margin-top:2px}\n.sc-person__do{font-size:12.5px;color:var(--fx-slate);line-height:1.5;margin-top:14px}\n.sc-person__statuses{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px;padding-top:14px;border-top:1px solid var(--fx-line)}\n.sc-chip{font-family:var(--fx-mono);font-size:9.5px;font-weight:500;letter-spacing:.03em;padding:3px 7px;border-radius:var(--fx-r-full);background:var(--fx-paper-2);color:var(--fx-slate);white-space:nowrap}\n.sc-person--c .sc-person__av{background:var(--fx-coral)} .sc-person--c{border-top:3px solid var(--fx-coral)}\n.sc-person--i .sc-person__av{background:var(--fx-navy)} .sc-person--i{border-top:3px solid var(--fx-navy)}\n.sc-person--v .sc-person__av{background:#6D28D9} .sc-person--v{border-top:3px solid #6D28D9}\n\n/* routing visual: status -> person */\n.sc-route{display:flex;flex-direction:column;gap:10px;margin-top:28px}\n.sc-route__row{display:flex;align-items:center;gap:14px;background:var(--fx-white);border:1px solid var(--fx-line);border-radius:12px;padding:13px 16px;box-shadow:var(--fx-e-1)}\n.sc-route__chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}\n.sc-route__arrow{color:var(--fx-mute);flex:0 0 auto}\n.sc-route__arrow svg{width:18px;height:18px}\n.sc-route__who{display:flex;align-items:center;gap:9px;flex:0 0 auto;min-width:140px}\n.sc-route__av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px}\n.sc-route__name{font-size:13px;font-weight:600}\n.sc-route__job{font-family:var(--fx-mono);font-size:10px;color:var(--fx-mute);text-transform:uppercase;letter-spacing:.04em}\n\n/* 8-step flow */\n.sc-flow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:30px;counter-reset:step}\n.sc-step{background:var(--fx-white);border:1px solid var(--fx-line);border-radius:13px;padding:16px;position:relative;box-shadow:var(--fx-e-1)}\n.sc-step__n{width:26px;height:26px;border-radius:8px;background:var(--fx-navy);color:#fff;display:grid;place-items:center;font-family:var(--fx-mono);font-size:12px;font-weight:600}\n.sc-step__ic{position:absolute;top:14px;right:14px;color:var(--fx-coral);opacity:.9}\n.sc-step__ic svg{width:18px;height:18px}\n.sc-step__t{font-size:13.5px;font-weight:600;margin-top:13px;letter-spacing:-.01em}\n.sc-step__d{font-size:11.5px;color:var(--fx-mute);line-height:1.45;margin-top:5px}\n.sc-step.is-key{border-color:var(--fx-coral);background:linear-gradient(180deg,var(--fx-coral-50),var(--fx-white))}\n.sc-step.is-key .sc-step__n{background:var(--fx-coral)}\n\n/* home-screen anatomy */\n.sc-anat{display:grid;grid-template-columns:84px 200px 1fr;gap:0;margin-top:30px;border:1px solid var(--fx-line-2);border-radius:14px;overflow:hidden;box-shadow:var(--fx-e-2);background:var(--fx-white)}\n.sc-anat__col{padding:16px 14px;position:relative}\n.sc-anat__col+.sc-anat__col{border-left:1px solid var(--fx-line)}\n.sc-anat__col--nav{background:var(--fx-navy);color:var(--fx-on-2)}\n.sc-anat__tag{position:absolute;top:10px;right:10px;font-family:var(--fx-mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;background:var(--fx-coral);color:#fff;padding:2px 6px;border-radius:var(--fx-r-full)}\n.sc-anat__col--nav .sc-anat__tag{right:auto;left:10px}\n.sc-anat__mini{height:9px;border-radius:3px;background:var(--fx-paper-2);margin-bottom:8px}\n.sc-anat__col--nav .sc-anat__mini{background:rgba(255,255,255,.12)}\n.sc-anat__mini.is-active{background:var(--fx-coral)}\n.sc-anat__lbl{font-family:var(--fx-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--fx-mute);margin-top:14px}\n.sc-anat__col--nav .sc-anat__lbl{color:var(--fx-on-3)}\n\n/* tip card */\n.sc-tip{display:flex;gap:16px;margin-top:28px;background:var(--fx-white);border:1px solid var(--fx-line);border-radius:14px;padding:20px;box-shadow:var(--fx-e-1)}\n.sc-tip__ic{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;background:var(--fx-amber-50);color:var(--fx-amber)}\n.sc-tip__ic svg{width:20px;height:20px}\n.sc-tip__t{font-size:14px;font-weight:600}\n.sc-tip__d{font-size:13px;color:var(--fx-mute);line-height:1.55;margin-top:4px}\n\n/* ============================================================\n   CHECKPOINT\n   ============================================================ */\n.sc-check{max-width:680px;margin:0 auto;background:var(--fx-white);border:1px solid var(--fx-line);border-radius:18px;padding:30px;box-shadow:var(--fx-e-2);position:relative}\n.sc-scene--dark .sc-check{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.14);backdrop-filter:blur(6px);box-shadow:none}\n.sc-check__k{display:flex;align-items:center;gap:8px;font-family:var(--fx-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--fx-coral-h)}\n.sc-check__k svg{width:14px;height:14px}\n.sc-check__q{font-size:21px;font-weight:600;letter-spacing:-.01em;margin-top:14px;line-height:1.3}\n.sc-check--light .sc-check__q{color:var(--fx-ink)}\n.sc-check__opts{display:flex;flex-direction:column;gap:9px;margin-top:20px}\n.sc-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:11px;border:1px solid var(--fx-line);background:var(--fx-white);cursor:pointer;font-size:14px;text-align:left;transition:border-color var(--fx-dur),background var(--fx-dur);color:var(--fx-ink)}\n.sc-scene--dark .sc-opt{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:#fff}\n.sc-opt:hover{border-color:var(--fx-line-2)}\n.sc-scene--dark .sc-opt:hover{border-color:rgba(255,255,255,.28)}\n.sc-opt__key{width:26px;height:26px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;font-family:var(--fx-mono);font-size:12px;font-weight:600;background:var(--fx-paper-2);color:var(--fx-slate)}\n.sc-scene--dark .sc-opt__key{background:rgba(255,255,255,.1);color:var(--fx-on-2)}\n.sc-opt__mark{margin-left:auto;width:20px;height:20px;flex:0 0 auto;opacity:0}\n.sc-opt__mark svg{width:20px;height:20px}\n.sc-opt.is-correct{border-color:var(--fx-green);background:var(--fx-green-50)}\n.sc-opt.is-correct .sc-opt__key{background:var(--fx-green);color:#fff}\n.sc-opt.is-correct .sc-opt__mark{opacity:1;color:var(--fx-green)}\n.sc-opt.is-wrong{border-color:var(--fx-red);background:var(--fx-red-50)}\n.sc-opt.is-wrong .sc-opt__key{background:var(--fx-red);color:#fff}\n.sc-opt.is-wrong .sc-opt__mark{opacity:1;color:var(--fx-red)}\n.sc-scene--dark .sc-opt.is-correct,.sc-scene--dark .sc-opt.is-wrong{color:var(--fx-ink)}\n.sc-check__fb{margin-top:18px;font-size:13.5px;line-height:1.55;color:var(--fx-slate);opacity:0;max-height:0;overflow:hidden;transition:opacity .4s,max-height .4s}\n.sc-scene--dark .sc-check__fb{color:var(--fx-on-2)}\n.sc-check.answered .sc-check__fb{opacity:1;max-height:120px}\n.sc-check__fb b{color:var(--fx-green)}\n\n/* ============================================================\n   COMPLETION\n   ============================================================ */\n.sc-complete{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:radial-gradient(110% 100% at 50% 0%,#1B1B47,#020040);color:#fff;padding:80px 24px;position:relative;overflow:hidden}\n.sc-complete__inner{max-width:560px;position:relative;z-index:2}\n.sc-complete__ring{width:120px;height:120px;margin:0 auto;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 50% 35%,#FFE6A8,#F0B429);box-shadow:0 0 60px -8px rgba(240,180,41,.8);color:#7a4d00;animation:pulseRing 2s ease-in-out infinite}\n@keyframes pulseRing{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}\n.sc-complete__ring svg{width:58px;height:58px}\n.sc-complete__k{font-family:var(--fx-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--fx-coral-h);margin-top:26px}\n.sc-complete__t{font-size:clamp(32px,5vw,48px);font-weight:600;letter-spacing:-.025em;margin:10px 0 0}\n.sc-complete__s{font-size:15px;color:var(--fx-on-2);margin:14px 0 0;line-height:1.6}\n.sc-complete__stats{display:flex;gap:12px;justify-content:center;margin-top:30px;flex-wrap:wrap}\n.sc-complete__stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:16px 22px;min-width:120px}\n.sc-complete__stat-v{font-size:26px;font-weight:600;letter-spacing:-.02em}\n.sc-complete__stat-k{font-family:var(--fx-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fx-on-3);margin-top:5px}\n.sc-complete__level{margin-top:26px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 20px;text-align:left}\n.sc-complete__level-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--fx-on-2)}\n.sc-complete__level-bar{height:7px;border-radius:4px;background:rgba(255,255,255,.12);margin-top:10px;overflow:hidden}\n.sc-complete__level-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--fx-coral),var(--fx-coral-h));width:0;transition:width 1.4s var(--fx-ease)}\n.sc-complete__actions{display:flex;gap:10px;justify-content:center;margin-top:30px;flex-wrap:wrap}\n.sc-next{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px 16px;margin-top:26px;text-align:left;cursor:pointer;transition:background var(--fx-dur)}\n.sc-next:hover{background:rgba(255,255,255,.1)}\n.sc-next__thumb{width:80px;height:50px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;background:var(--fx-navy-3);color:var(--fx-coral-h)}\n.sc-next__k{font-family:var(--fx-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fx-on-3)}\n.sc-next__t{font-size:14px;font-weight:600;margin-top:3px}\n.sc-next__go{margin-left:auto;color:#fff}\n\n/* confetti canvas */\n#scConfetti{position:fixed;inset:0;z-index:90;pointer-events:none;display:none}\n\n@media (max-width:920px){\n  .sc-team{grid-template-columns:1fr}\n  .sc-flow{grid-template-columns:repeat(2,1fr)}\n  .sc-anat{grid-template-columns:1fr}\n  .sc-hero{padding:32px 24px}\n  .sc-hero__title{max-width:none}\n}\n<\u002Fstyle>\n<link rel=\"icon\" href=\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ED4B00'/%3E%3Ctext x='16' homeWrap\"><\u002Fdiv>\n    <\u002Fmain>\n\n    <!-- PHASE -->\n    <main class=\"fx-page sc-view\" data-view=\"phase\" style=\"padding-top:14px\">\n      <div class=\"sc-wrap\" id=\"phaseWrap\"><\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== LESSON PLAYER (fixed overlay) ===== -->\n<div class=\"sc-player\" id=\"player\">\n  <header class=\"sc-hud\">\n    <div class=\"sc-hud__back\" id=\"hudBack\"><i data-lucide=\"arrow-left\"><\u002Fi>Exit lesson<\u002Fdiv>\n    <div class=\"sc-hud__sep\"><\u002Fdiv>\n    <div class=\"sc-hud__title\" id=\"hudTitle\">Welcome &amp; System<\u002Fdiv>\n    <div class=\"sc-hud__sep\"><\u002Fdiv>\n    <div class=\"sc-hud__scene\" id=\"hudScene\">Scene 1 of 10<\u002Fdiv>\n    <div class=\"sc-hud__spacer\"><\u002Fdiv>\n    <div class=\"sc-hud__xp\" id=\"hudXp\"><i data-lucide=\"zap\"><\u002Fi><span class=\"n\">0<\u002Fspan>&nbsp;XP<\u002Fdiv>\n    <div class=\"sc-hud__prog\" id=\"hudProg\"><\u002Fdiv>\n  <\u002Fheader>\n  <div class=\"sc-toast\" id=\"scToast\"><i data-lucide=\"zap\"><\u002Fi><span><\u002Fspan><\u002Fdiv>\n  <div class=\"sc-stage\" id=\"stage\"><\u002Fdiv>\n<\u002Fdiv>\n\n<canvas id=\"scConfetti\"><\u002Fcanvas>\n\n<script src=\"c0a85732-564c-4ebf-8d6f-c377cfc7e00f\"><\u002Fscript>\n<script src=\"f28bbfd3-fc9f-459f-9c39-1cac64c873a1\"><\u002Fscript>\n<script src=\"a90fe252-6b15-4be7-8175-4a5860807e68\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
